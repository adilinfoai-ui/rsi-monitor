<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#050a0e"/>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#0a2a3a"/>
      <stop offset="100%" stop-color="#050a0e"/>
    </radialGradient>
  </defs>
  <!-- Signal circles -->
  <circle cx="256" cy="200" r="120" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.15"/>
  <circle cx="256" cy="200" r="80" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.25"/>
  <circle cx="256" cy="200" r="40" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="200" r="12" fill="#00d4ff" opacity="0.9"/>
  <!-- RSI wave line -->
  <polyline points="60,350 110,320 150,360 200,280 240,310 280,240 320,290 360,220 400,260 450,200"
    fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- OB line -->
  <line x1="60" y1="230" x2="450" y2="230" stroke="#ff3366" stroke-width="2" stroke-dasharray="8,6" opacity="0.6"/>
  <!-- OS line -->
  <line x1="60" y1="340" x2="450" y2="340" stroke="#00ff88" stroke-width="2" stroke-dasharray="8,6" opacity="0.6"/>
  <!-- Glow dot on wave -->
  <circle cx="360" cy="220" r="10" fill="#00d4ff" opacity="0.8"/>
  <circle cx="360" cy="220" r="20" fill="#00d4ff" opacity="0.15"/>
  <!-- Text -->
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="42" font-weight="bold" fill="#00d4ff" letter-spacing="4">RSI</text>
  <text x="256" y="500" text-anchor="middle" font-family="monospace" font-size="22" fill="#4a7a99" letter-spacing="2">MONITOR</text>
</svg>
